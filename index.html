<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محول PDF إلى Word</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="light">
  <div class="container">
    <!-- رأس الصفحة -->
    <header class="header">
      <h1 class="title" data-lang="title">محول PDF إلى Word</h1>
      <p class="subtitle" data-lang="subtitle">حوّل ملفات PDF إلى مستندات Word بسهولة مع دعم كامل للغة العربية</p>
      <div class="controls">
        <button id="langToggle" class="icon-btn" title="تبديل اللغة">
          <span class="lang-text">EN</span>
        </button>
        <button id="darkModeToggle" class="icon-btn" title="تبديل الوضع الليلي">
          <svg class="moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- منطقة الرفع -->
    <div class="upload-card glass">
      <div class="drop-zone" id="dropZone">
        <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <p class="drop-text" data-lang="dropText">اسحب وأفلت ملف PDF هنا</p>
        <p class="drop-or" data-lang="dropOr">أو</p>
        <label for="fileInput" class="browse-btn">
          <span data-lang="browse">اختر ملفاً</span>
        </label>
        <input type="file" id="fileInput" accept=".pdf" hidden>
        <p id="fileName" class="file-name"></p>
      </div>
    </div>

    <!-- زر التحويل -->
    <button id="convertBtn" class="convert-btn glass" disabled>
      <span class="btn-text" data-lang="convertBtn">تحويل إلى Word</span>
      <span class="spinner" id="spinner" style="display:none;"></span>
    </button>

    <!-- رسالة الحالة -->
    <div id="statusMessage" class="status-message" style="display:none;"></div>

    <!-- رابط التحميل -->
    <a id="downloadLink" class="download-btn" style="display:none;" data-lang="download">تحميل ملف Word</a>
  </div>

  <!-- السكريبتات -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
  <script src="script.js"></script>
</body>
</html>
